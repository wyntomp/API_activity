<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>API Users Table</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #e8ebee, #e9e9e9);
            margin: 0;
            padding: 20px;
            color: #333;
        }

        h1 {
            text-align: center;
            color: white;
        }

        .container {
            max-width: 900px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            padding: 12px;
            text-align: center;
        }

        th {
            background: #4facfe;
            color: white;
        }

        tr:nth-child(even) {
            background: #f2f2f2;
        }

        tr:hover {
            background: #d9f0ff;
        }

        .personal {
            background-color: #ffeaa7 !important;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>Users Information Table</h1>

    <div class="container">
        <table id="userTable">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>First Name</th>
                    <th>Last Name</th>
                    <th>Username</th>
                    <th>Email</th>
                    <th>Zipcode</th>
                </tr>
            </thead>
            <tbody>
                <!-- Personal Info (Shown First) -->
                <tr class="personal">
                    <td>0</td>
                    <td>YourFirstName</td>
                    <td>YourLastName</td>
                    <td>YourUsername</td>
                    <td>youremail@example.com</td>
                    <td>0000</td>
                </tr>
            </tbody>
        </table>
    </div>

    <script>
        fetch('https://jsonplaceholder.typicode.com/users')
            .then(response => response.json())
            .then(data => {
                const table = document.getElementById('userTable').getElementsByTagName('tbody')[0];

                data.forEach(user => {
                    // Split name into first and last
                    let nameParts = user.name.split(" ");
                    let firstName = nameParts[0];
                    let lastName = nameParts.slice(1).join(" ");

                    let row = table.insertRow();

                    row.innerHTML = `
                        <td>${user.id}</td>
                        <td>${firstName}</td>
                        <td>${lastName}</td>
                        <td>${user.username}</td>
                        <td>${user.email}</td>
                        <td>${user.address.zipcode}</td>
                    `;
                });
            })
            .catch(error => {
                console.error("Error fetching data:", error);
            });
    </script>

</body>
</html>
